name: Seed Dev Database

on:
  workflow_dispatch:

jobs:
  seed-dev:
    runs-on: ubuntu-latest
    name: Seed Dev Database
    environment: dev
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/gcp-auth
        with:
          wif_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          region: ${{ vars.GCP_REGION }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location: ${{ vars.GKE_LOCATION }}

      - name: Run staging seed
        run: |
          kubectl exec deployment/${{ vars.DEV_DEPLOYMENT }} \
            -n ${{ vars.DEV_NAMESPACE }} \
            -- yarn knex seed:run --specific=staging.js

      - name: Run dev seed
        run: |
          kubectl exec deployment/${{ vars.DEV_DEPLOYMENT }} \
            -n ${{ vars.DEV_NAMESPACE }} \
            -- yarn knex seed:run --specific=dev.js
