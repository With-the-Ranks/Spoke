name: CI/CD Pipeline

on:
  push:

env:
  GCP_REGION: us-west1
  GAR_REGISTRY: us-west1-docker.pkg.dev/spoke-407503/spoke/core
  GKE_CLUSTER: spoke-cluster
  WIF_PROVIDER: projects/630731592917/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: spoke-ci@spoke-407503.iam.gserviceaccount.com

jobs:
  hadolint:
    runs-on: ubuntu-latest
    name: "Hadolint"
    steps:
      - uses: actions/checkout@v4
      - uses: jbergstroem/hadolint-gh-action@v1
        with:
          error_level: 0
          dockerfile: "Dockerfile"

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version:
          - 20.16.0-bullseye
    container:
      image: node:${{ matrix.node-version }}

    services:
      postgres:
        image: postgres:13.4
        env:
          POSTGRES_DB: spoke
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -h localhost -p 5432"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      WEBPACK_HOST: "localhost"
      WEBPACK_PORT: "3000"
      DEV_APP_PORT: "8090"

      BASE_URL: "localhost:3000"
      SESSION_SECRET: "SuperSecret"
      PHONE_NUMBER_COUNTRY: US
      SUPPRESS_SELF_INVITE: "false"
      JOBS_SAME_PROCESS: "1"

      TEST_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/spoke"

      PASSPORT_STRATEGY: "local"

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-yarn-

      - name: Install dependencies
        run: yarn install

      - name: Run codegen
        run: yarn codegen:ts

      - name: Lint Apps
        run: yarn lint && yarn format

      - name: Run migrations
        run: yarn migrate:worker && yarn knex migrate:latest

      - name: Run Tests
        run: yarn jest --forceExit --detectOpenHandles src/**/*

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    needs: test
    name: Deploy to Staging
    environment: staging
    concurrency:
      group: staging-deploy
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: meta
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/gcp-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
          region: ${{ env.GCP_REGION }}

      - uses: ./.github/actions/docker-build
        with:
          registry: ${{ env.GAR_REGISTRY }}
          tags: |
            main-latest
            main-${{ steps.meta.outputs.sha_short }}
          spoke_version: main-${{ steps.meta.outputs.sha_short }}
          cache_scope: staging

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}

      - name: Restart staging deployment
        run: |
          if kubectl get deployment main-spoke -n spoke-staging &>/dev/null; then
            kubectl rollout restart deployment/main-spoke -n spoke-staging
            kubectl rollout status deployment/main-spoke -n spoke-staging --timeout=5m
          else
            echo "Staging deployment not found — skipping restart"
          fi

  publish-docker-image:
    if: startsWith( github.ref, 'refs/tags/v')
    needs: test
    name: Publish Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version and SHA
        id: meta
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          GIT_REF=${GITHUB_REF#refs/*/}
          VERSION=${GIT_REF#"v"}
          VERSION=${VERSION//[\/]/-}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/gcp-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
          region: ${{ env.GCP_REGION }}

      - uses: ./.github/actions/docker-build
        with:
          registry: ${{ env.GAR_REGISTRY }}
          tags: |
            latest
            ${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.sha_short }}
          spoke_version: ${{ steps.meta.outputs.version }}
          cache_scope: release
