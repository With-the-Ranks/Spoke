# Grafana alerting provisioning — notification routing policy
#
# Routing logic:
#   severity=critical  →  oncall-critical  (pages on-call via Grafana OnCall)
#   severity=warning   →  slack-warnings   (Slack only)
#   everything else    →  slack-warnings (fallback for unmatched alerts)

apiVersion: 1

policies:
  - orgId: 1
    receiver: slack-warnings
    group_by: [alertname, environment]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: oncall-critical
        matchers:
          - severity = critical
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 1h
        continue: false

      - receiver: slack-warnings
        matchers:
          - severity = warning
        group_wait: 1m
        group_interval: 5m
        repeat_interval: 8h
        continue: false
